[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "java -jar app.jar"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# This service definition tells Railway how to run and check the health of your app
[[services]]
name = "web"
default = true

[services.env]
PORT = "8080"

[services.http]
path = "/"
port = 8080
healthyPath = "/actuator/health" # Crucial for Railway to know your app is live
healthyTimeout = 10
healthyInterval = 30
unhealthyTimeout = 10
unhealthyInterval = 30